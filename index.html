<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="google-site-verification" content="bym9ILevzzdQQQyPr3Y4AY5AIyerSFQ8vzpIRvCYiGM">
  <title>lmj1018.github.io</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f7fb;
      --card: #ffffff;
      --text: #1b2430;
      --sub: #526173;
      --line: #d7dee7;
      --accent: #0f6ab4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top right, #d8ecff 0, transparent 36%),
        linear-gradient(180deg, #eef5fb 0%, #f7fafd 100%);
      color: var(--text);
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 18px 40px rgba(16, 42, 67, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.6;
    }

    .sub {
      color: var(--sub);
    }

    code {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #edf5ff;
      border: 1px solid #c8def6;
      color: var(--accent);
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>App Ads Hosting</h1>
      <p>This site hosts the root-level <code>app-ads.txt</code> file used for AdMob verification.</p>
      <p class="sub">Direct file URL: <a href="/app-ads.txt">/app-ads.txt</a></p>
    </section>
  </main>
</body>
</html>
